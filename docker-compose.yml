  # db:
  #   environment:
  #     - POSTGRES_PASSWORD=postgres # 修改时请同时修改 backend/api/settings.py 中的设置
  #   healthcheck:
  #     interval: 1s
  #     retries: 10
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
