  #     - ./postgresql:/var/lib/postgresql

  backend:
    # depends_on:
    #   - db
    entrypoint: /code/entrypoint.sh
    environment:
      - DEBUG=FALSE
    image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    # network_mode: service:tailscale
    restart: unless-stopped
    volumes:
      - uv-venv:/code/.venv
      - ./backend:/code
    working_dir: /code

  frontend:
    entrypoint: /code/entrypoint.sh
    image: oven/bun:slim
    restart: on-failure
    volumes:
      - bun-dist:/code/dist
      - bun-node-modules:/code/node_modules
      - ./frontend:/code
    working_dir: /code

  app:
    depends_on:
      - backend
    image: caddy
    labels:
      traefik.enable: True
      traefik.http.routers.aeronautical-map.rule: Host(`maps.hanming.li`) || Host(`maps.lihanming.cn`)
    networks:
      - default
      - web
    volumes:
      - bun-dist:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: unless-stopped

volumes:
  bun-dist:
  bun-node-modules:
  # tailscale-state:
  uv-venv:
